<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App qua môn</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style_exam.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F9EVME21XW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-F9EVME21XW');
    </script>
</head>

<body>
    <div class="wallpaper">
        <video id="bg-video" loop muted autoplay playsinline webkit-playsinline preload="auto">
            <source src="wall/bg.mp4" type="video/mp4">
        </video>
        <div class="wallpaper-overlay"></div>
    </div>

    <div class="mac-window closing" id="app-window">
        <div class="title-bar">
            <div class="window-controls">
                <div class="win-info-btn" id="info-btn" title="Thông tin ứng dụng">i</div>
                <div class="win-close-btn disabled" title="Không thể đóng">&#x2715;</div>
            </div>
            <div class="window-title">App này dùng để qua môn</div>
        </div>

        <div class="window-content">
            <div id="menu-screen" class="fade-in">
                <div class="hero-text">
                    <h2>Thiết lập</h2>
                    <p>Chọn bài tập của bạn</p>
                </div>

                <div class="compact-grid">
                    <div class="mac-form-group">
                        <label>Môn học</label>
                        <select id="subject-select"></select>
                    </div>

                    <div class="mac-form-group">
                        <label>Chương</label>
                        <select id="chapter-select"></select>
                    </div>
                </div>

                <div class="mac-form-group">
                    <label>Số lượng câu</label>
                    <div class="segmented-control">
                        <label><input type="radio" name="limit" value="5" /><span>Xem trước (5)</span></label>
                        <label><input type="radio" name="limit" value="25" checked /><span>25</span></label>
                        <label><input type="radio" name="limit" value="50" /><span>50</span></label>
                        <label><input type="radio" name="limit" value="all" /><span>Tất cả</span></label>
                    </div>
                </div>

                <button id="start-btn" class="mac-btn-primary">Bắt đầu</button>
                <button id="exam-mode-btn" class="mac-btn-secondary">Chế độ bài kiểm tra</button>
                <button id="history-btn" class="mac-btn-secondary">Xem lịch sử làm bài</button>
            </div>

            <div id="quiz-screen" style="display: none" class="fade-in">
                <div class="quiz-header-compact">
                    <button id="back-home-btn" class="mac-btn-text">‹ Quay lại</button>
                    <span class="q-counter"><span id="current-q-num">1</span> / <span id="total-q-num">10</span></span>
                </div>

                <div class="split-view">
                    <div class="question-pane">
                        <h3 id="q-text">Loading...</h3>
                    </div>
                    <div id="options-container" class="options-list-compact"></div>
                </div>

                <div class="quiz-footer-compact">
                    <span id="feedback" style="font-weight: 600; font-size: 13px"></span>
                    <button id="next-btn" class="mac-btn-primary small" style="display: none">Tiếp theo</button>
                </div>
            </div>

            <div id="result-screen" style="display: none" class="fade-in">
                <div class="hero-text">
                    <div class="score-big" id="final-score-10">0.0</div>
                    <p>Điểm số (Hệ 10)</p>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button onclick="resetToMenu()" class="mac-btn-primary" style="flex: 1;">Làm lại bài
                        mới</button>
                </div>

                <div class="divider">Chi tiết câu sai</div>
                <div id="review-list"></div>
            </div>

            <div id="history-screen" style="display: none" class="fade-in">
                <div class="quiz-header-compact">
                    <button id="history-back-btn" class="mac-btn-text">‹ Quay lại</button>
                    <!-- Title and Open Window Button are removed since the UI acts differently per platform automatically -->
                </div>

                <div id="history-content" style="padding-top: 5px;">
                    <!-- Lịch sử sẽ được inject vào đây -->
                </div>

                <button id="clear-history-btn" class="mac-btn-secondary">Xóa toàn bộ lịch sử</button>
            </div>
        </div>

        <div class="app-credit">Designed by @phucthanhh, Built with Gemini AI - v<span id="app-version-text">1.6</span></div>
    </div>

    <!-- Removed mac-modal-overlay as requested -->

    <!-- Floating Controls -->
    <div class="floating-controls">
        <button id="mobile-info-toggle" class="mobile-info-toggle-btn" title="Thông tin ứng dụng">
            <span id="mobile-info-icon"
                style="font-family: serif; font-style: italic; font-weight: bold; font-size: 22px;">i</span>
        </button>
        <button id="focus-toggle" class="focus-toggle-btn" title="Chế độ tập trung">
            <span id="focus-icon">🎯</span>
        </button>
        <button id="theme-toggle" class="theme-toggle-btn" title="Chuyển chế độ sáng/tối">
            <span id="theme-icon">☀️</span>
        </button>
    </div>

    <script src="scripts/config.js"></script>
    <script src="scripts/parser.js"></script>
    <script src="scripts/history.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/quiz.js"></script>
    <script src="scripts/exam.js"></script>
    <script src="scripts/main.js"></script>
</body>

</html>
